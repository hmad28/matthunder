<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>matthunder — Web Interface</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⚡</text></svg>">
<style>
/* ═══════════════════════ DESIGN SYSTEM ═══════════════════════ */
:root {
  --bg: #0d1117; --bg-2: #161b22; --bg-3: #1c2128;
  --panel: #21262d; --panel-2: #30363d; --border: #30363d;
  --text: #e6edf3; --text-2: #8b949e; --text-3: #484f58;
  --blue: #58a6ff; --blue-bg: rgba(56,139,253,0.1);
  --green: #3fb950; --green-bg: rgba(46,160,67,0.1);
  --yellow: #d29922; --yellow-bg: rgba(187,128,9,0.1);
  --red: #f85149; --red-bg: rgba(248,81,73,0.1);
  --purple: #bc8cff; --orange: #d4760a;
  --radius: 8px; --radius-sm: 4px;
  --font: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  --mono: 'SF Mono','Fira Code','Cascadia Code',Consolas,monospace;
  --sidebar: 240px; --topbar: 56px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
/* ═══ scrollbar ═══ */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--panel-2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}
/* ═══ app shell ═══ */
.app{display:flex;min-height:100vh}
/* ═══ sidebar ═══ */
.sidebar{width:var(--sidebar);background:var(--bg-2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow:hidden}
.sidebar .brand{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar .brand .logo{font-size:20px;font-weight:700;color:var(--text)}
.sidebar .brand .logo span{color:var(--blue)}
.sidebar .brand .version{font-size:11px;color:var(--text-2);margin-left:auto}
.sidebar .nav{padding:8px 0;flex:1;overflow-y:auto}
.sidebar .nav-group{padding:8px 16px 4px;font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.8px}
.sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:8px 20px;cursor:pointer;color:var(--text-2);transition:all .12s;border-left:3px solid transparent;text-decoration:none}
.sidebar .nav-item:hover{background:var(--bg-3);color:var(--text)}
.sidebar .nav-item.active{background:var(--blue-bg);color:var(--blue);border-left-color:var(--blue);font-weight:500}
.sidebar .nav-item .icon{width:20px;text-align:center;font-size:15px;flex-shrink:0}
.sidebar .status-bar{padding:12px 20px;border-top:1px solid var(--border);font-size:12px;display:flex;align-items:center;gap:8px}
.sidebar .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar .status-dot.idle{background:var(--text-3)}
.sidebar .status-dot.running{background:var(--green);box-shadow:0 0 6px var(--green)}
.sidebar .status-dot.error{background:var(--red)}
/* ═══ main ═══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:100vh}
.topbar{height:var(--topbar);background:var(--bg-2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;flex-shrink:0;gap:12px}
.topbar h2{font-size:16px;font-weight:600}
.topbar .breadcrumb{color:var(--text-2);font-size:13px}
.topbar .breadcrumb span{color:var(--text-2)}
.topbar .breadcrumb .current{color:var(--text)}
.content{flex:1;overflow-y:auto;padding:24px}
/* ═══ cards ═══ */
.card{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px}
.card-header .badge{margin-left:auto}
.card-body{padding:20px}
.card-body>:not(:last-child){margin-bottom:14px}
/* ═══ grid ═══ */
.row{display:flex;gap:16px;flex-wrap:wrap}
.col{flex:1;min-width:280px}
.col-3{flex:0 0 calc(33.33% - 11px);min-width:220px}
/* ═══ forms ═══ */
input,select,textarea,button{font-family:var(--font);font-size:14px;outline:none}
input,select,textarea{background:var(--bg-3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius-sm);width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-bg)}
textarea{resize:vertical;min-height:80px;font-family:var(--mono);font-size:13px}
.input-group{display:flex;gap:8px}
.input-group input{flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-weight:500;transition:all .12s;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn:not(:disabled):hover{opacity:.85}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:not(:disabled):hover{background:#4c96e8}
.btn-danger{background:var(--red);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-warning{background:var(--yellow);color:#000}
.btn-secondary{background:var(--panel);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--panel-2)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-lg{padding:10px 24px;font-size:15px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
/* ═══ tables ═══ */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--text-2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;background:var(--bg-3)}
tr:hover td{background:var(--bg-3)}
td .text-muted{color:var(--text-2)}
/* ═══ badges ═══ */
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;gap:4px}
.badge-critical{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,81,73,.3)}
.badge-high{background:var(--red-bg);color:var(--orange)}
.badge-medium{background:var(--yellow-bg);color:var(--yellow)}
.badge-low{background:var(--blue-bg);color:var(--blue)}
.badge-info{background:rgba(56,139,253,.08);color:var(--blue)}
.badge-success{background:var(--green-bg);color:var(--green)}
.badge-warning{background:var(--yellow-bg);color:var(--yellow)}
.badge-neutral{background:var(--panel-2);color:var(--text-2)}
/* ═══ terminal / log ═══ */
.terminal{background:#040a13;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--mono);font-size:12px;padding:14px;max-height:500px;overflow-y:auto;line-height:1.5}
.terminal .line{padding:1px 0;color:var(--green);word-break:break-all}
.terminal .line.info{color:var(--blue)}
.terminal .line.warn{color:var(--yellow)}
.terminal .line.error{color:var(--red)}
.terminal .line.muted{color:var(--text-3)}
.terminal .line.highlight{background:rgba(56,139,253,.08);padding:2px 6px;border-radius:2px}
/* ═══ pipeline ═══ */
.pipeline{display:flex;flex-direction:column;gap:0}
.pipeline-step{display:flex;align-items:center;gap:14px;padding:12px 14px;border-left:3px solid var(--border);margin-left:12px;position:relative;transition:all .2s}
.pipeline-step::before{content:'';position:absolute;left:-5px;top:50%;width:10px;height:10px;border-radius:50%;background:var(--panel-2);border:2px solid var(--border);transform:translateY(-50%)}
.pipeline-step.done{border-left-color:var(--green)}
.pipeline-step.done::before{background:var(--green);border-color:var(--green)}
.pipeline-step.running{border-left-color:var(--blue)}
.pipeline-step.running::before{background:var(--blue);border-color:var(--blue);animation:pulse 1.2s infinite}
.pipeline-step.pending{opacity:.5}
.pipeline-step .step-icon{width:28px;text-align:center;font-size:14px}
.pipeline-step .step-label{font-weight:500}
.pipeline-step .step-desc{font-size:12px;color:var(--text-2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* ═══ stat cards ═══ */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.stat-card{background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-card .stat-value{font-size:28px;font-weight:700;color:var(--text)}
.stat-card .stat-label{font-size:12px;color:var(--text-2);margin-top:4px}
/* ═══ tabs ═══ */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;gap:0}
.tab{padding:10px 20px;cursor:pointer;color:var(--text-2);border-bottom:2px solid transparent;transition:all .12s;font-size:13px;font-weight:500}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-pane{display:none}
.tab-pane.active{display:block}
/* ═══ modal ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);width:90%;max-width:600px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,.4)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;font-weight:600;font-size:15px}
.modal-header .btn{position:absolute;top:12px;right:12px}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
/* ═══ toast ═══ */
.toast-container{position:fixed;top:16px;right:16px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.3);display:flex;align-items:center;gap:10px;animation:slideIn .2s ease;max-width:400px}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--blue)}
.toast.warning{border-left:3px solid var(--yellow)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
/* ═══ misc ═══ */
.hidden{display:none!important}
.flex{display:flex;gap:8px;align-items:center}
.flex-wrap{flex-wrap:wrap}
.grow{flex:1}
.text-center{text-align:center}
.text-right{text-align:right}
.text-muted{color:var(--text-2)!important}
.text-red{color:var(--red)}
.text-green{color:var(--green)}
.text-blue{color:var(--blue)}
.mt-1{margin-top:12px}
.mb-1{margin-bottom:12px}
.ml-auto{margin-left:auto}
.gap-1{gap:12px}
.loading{text-align:center;padding:40px;color:var(--text-2)}
.loading .spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-2)}
.empty-state .empty-icon{font-size:40px;margin-bottom:8px}
pre{font-family:var(--mono);font-size:12px;line-height:1.5}
a{color:var(--blue);text-decoration:none}
.clickable{cursor:pointer}
.clickable:hover td{background:var(--blue-bg)!important}
a:hover{text-decoration:underline}
code{background:var(--bg-3);padding:2px 6px;border-radius:3px;font-size:12px}
.tag{display:inline-block;padding:1px 8px;border-radius:3px;font-size:11px;font-weight:500}
.tag-blue{background:var(--blue-bg);color:var(--blue)}
.tag-green{background:var(--green-bg);color:var(--green)}
.tag-red{background:var(--red-bg);color:var(--red)}
.tag-yellow{background:var(--yellow-bg);color:var(--yellow)}
/* ═══ responsive ═══ */
@media(max-width:768px){
  .sidebar{width:60px}
  .sidebar .brand .logo span,.sidebar .brand .version,.sidebar .nav-item span,.sidebar .nav-group{display:none}
  .sidebar .nav-item{padding:10px;justify-content:center}
  .sidebar .status-bar span{display:none}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .row>.col{min-width:100%}
}
</style>
</head>
<body>
<div class="app">
  <!-- ═══ SIDEBAR ═══ -->
  <nav class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">mat<span>thunder</span></div>
      <div class="version" id="sidebarVersion">v1.5</div>
    </div>
    <div class="nav">
      <div class="nav-group">General</div>
      <a class="nav-item active" data-page="dashboard"><span class="icon">📊</span><span>Dashboard</span></a>
      <a class="nav-item" data-page="deepscan"><span class="icon">🚀</span><span>Deep Scan</span></a>
      <a class="nav-item" data-page="scanners"><span class="icon">🔍</span><span>Scanners</span></a>
      <a class="nav-item" data-page="pipeline"><span class="icon">🧬</span><span>Pipeline</span></a>
      <div class="nav-group">Assets</div>
      <a class="nav-item" data-page="targets"><span class="icon">🎯</span><span>Targets</span></a>
      <a class="nav-item" data-page="results"><span class="icon">📈</span><span>Results</span></a>
      <div class="nav-group">Integrations</div>
      <a class="nav-item" data-page="acunetix"><span class="icon">🦅</span><span>Acunetix</span></a>
      <a class="nav-item" data-page="ai"><span class="icon">🤖</span><span>AI Analysis</span></a>
      <div class="nav-group">System</div>
      <a class="nav-item" data-page="config"><span class="icon">⚙️</span><span>Config</span></a>
    </div>
    <div class="status-bar"><span class="status-dot idle" id="statusDot"></span><span id="statusLabel">Idle</span></div>
  </nav>

  <!-- ═══ MAIN ═══ -->
  <div class="main">
    <div class="topbar">
      <h2 id="pageTitle">Dashboard</h2>
      <div class="breadcrumb" id="breadcrumb"><span class="current">Overview</span></div>
    </div>
    <div class="content" id="pageContent"></div>
  </div>
</div>

<!-- ═══ TOAST CONTAINER ═══ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ═══ MODAL ═══ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header" id="modalHeader">Title</div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  matthunder Web — Single-Page Application
// ═══════════════════════════════════════════════════════════════════

const API = window.location.origin;

// ─── Helpers ──────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }
function qs(s,e=document) { return e.querySelector(s); }
function qsa(s,e=document) { return e.querySelectorAll(s); }
function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

async function api(path, opts={}) {
  const res = await fetch(API+path, {
    headers: {'Content-Type':'application/json', ...opts.headers},
    ...opts
  });
  if (opts.raw) return res;
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || data.error || res.statusText);
  return data;
}

function toast(msg, type='info', dur=4000) {
  const c = $('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast '+type;
  el.innerHTML = `<span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transform='translateX(100px)'; el.style.transition='all .2s'; setTimeout(()=>el.remove(),200); }, dur);
}

function modal(title, bodyHtml, footerHtml='') {
  $('modalHeader').textContent = title;
  $('modalBody').innerHTML = bodyHtml;
  $('modalFooter').innerHTML = footerHtml;
  $('modalOverlay').classList.add('open');
}
function closeModal() { $('modalOverlay').classList.remove('open'); }
$('modalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

function loading(msg='Loading...') { return `<div class="loading"><div class="spinner"></div><div style="margin-top:12px">${msg}</div></div>`; }
function emptyState(icon,msg) { return `<div class="empty-state"><div class="empty-icon">${icon}</div><div>${msg}</div></div>`; }

function fmtDate(s) { if(!s) return '-'; try{ const d=new Date(s); return d.toLocaleString(); }catch(e){ return s; }}

function severityBadge(sev) {
  const map = {critical:'badge-critical',high:'badge-high',medium:'badge-medium',low:'badge-low',info:'badge-info'};
  return `<span class="badge ${map[sev?.toLowerCase()]||'badge-neutral'}">${esc(sev||'unknown')}</span>`;
}

// ─── SPA Router ───────────────────────────────────────────────
const PAGES = {};

function switchPage(name) {
  qsa('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page===name));
  const titles = {
    dashboard:'Dashboard',deepscan:'Deep Scan',scanners:'Inline Scanners',pipeline:'Pipeline',
    targets:'Targets',results:'Results',acunetix:'Acunetix',ai:'AI Analysis',config:'Configuration'
  };
  $('pageTitle').textContent = titles[name]||name;
  $('breadcrumb').innerHTML = `<span>${titles[name]||name}</span>`;
  const pageFn = PAGES[name];
  if(pageFn) pageFn();
}

document.querySelectorAll('[data-page]').forEach(el => {
  el.addEventListener('click', e => {
    e.preventDefault();
    switchPage(el.dataset.page);
  });
});

// ─── Status Poll ──────────────────────────────────────────────
async function pollStatus() {
  try {
    const s = await api('/api/scans/status');
    const dot = $('statusDot'), label = $('statusLabel');
    if(s.running) {
      dot.className = 'status-dot running';
      label.textContent = s.target ? `Scan: ${s.target.slice(0,20)}` : 'Running';
    } else {
      dot.className = 'status-dot idle';
      label.textContent = 'Idle';
    }
  } catch(e) {}
}
setInterval(pollStatus, 3000); pollStatus();

// ═══════════════════════════════════════════════════════════════
//  PAGE: Dashboard
// ═══════════════════════════════════════════════════════════════
PAGES.dashboard = async function() {
  const c = $('pageContent');
  c.innerHTML = loading('Loading dashboard...');
  try {
    let targets=[], history={scans:[]}, nuclei={files:[]}, reports={reports:[]};
    try { const t=await api('/api/targets/'); targets=t.targets||[]; } catch(e){}
    try { history=await api('/api/results/scans?limit=5'); } catch(e){}
    try { nuclei=await api('/api/results/nuclei'); } catch(e){}
    try { reports=await api('/api/results/reports'); } catch(e){}

    const recentScans = (history.scans||[]).slice(0,5);
    const totalFindings = recentScans.reduce((a,s)=>a+(s.total_links||0),0);

    c.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value">${targets.length}</div><div class="stat-label">Targets</div></div>
      <div class="stat-card"><div class="stat-value">${recentScans.length}</div><div class="stat-label">Recent Scans</div></div>
      <div class="stat-card"><div class="stat-value">${totalFindings}</div><div class="stat-label">Findings</div></div>
      <div class="stat-card"><div class="stat-value">${(reports.reports||[]).length}</div><div class="stat-label">Reports</div></div>
    </div>
    <div class="row mt-1">
      <div class="col">
        <div class="card">
          <div class="card-header">🚀 Quick Actions</div>
          <div class="card-body">
            <div class="btn-group">
              <button class="btn btn-primary" onclick="switchPage('deepscan')">🔍 Start Deep Scan</button>
              <button class="btn btn-secondary" onclick="switchPage('targets')">🎯 Manage Targets</button>
              <button class="btn btn-secondary" onclick="switchPage('scanners')">🔍 Run Scanner</button>
              <button class="btn btn-secondary" onclick="switchPage('acunetix')">🦅 Acunetix</button>
              <button class="btn btn-secondary" onclick="switchPage('ai')">🤖 AI Analysis</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">📋 Recent Scans <span class="badge badge-neutral">${recentScans.length}</span></div>
      <div class="card-body">
        ${recentScans.length ? `<div class="table-wrap"><table><thead><tr><th>ID</th><th>Scanner</th><th>Domain</th><th>Status</th><th>Findings</th><th>Date</th></tr></thead><tbody>
        ${recentScans.map(s=>`<tr><td><code>${(s.id||'').slice(0,8)}</code></td><td>${esc(s.scanner||'-')}</td><td>${esc(s.domain||'-')}</td>
        <td><span class="tag ${s.status==='completed'?'tag-green':s.status==='running'?'tag-green':'tag-yellow'}">${s.status||'-'}</span></td>
        <td>${s.total_links||0}</td><td>${fmtDate(s.created_at)}</td></tr>`).join('')}
        </tbody></table></div>` : emptyState('📭','No scans yet. Start a deep scan or run a scanner.')}
      </div>
    </div>`;
  } catch(e) { c.innerHTML = emptyState('❌','Error: '+esc(e.message)); }
};

// ═══════════════════════════════════════════════════════════════
//  PAGE: Deep Scan
// ═══════════════════════════════════════════════════════════════
let scanWs = null, scanRunning = false;
let scanLogLines = 0;

PAGES.deepscan = function() {
  $('pageContent').innerHTML = `

    </div>

async function pollDeepScanStatus() {
  try {
    const s = await api('/api/scans/status');
    const btnStart = $('btnScanStart'), btnStop = $('btnScanStop');
    const statusText = $('scanStatusText'), targetEl = $('scanStatusTarget');
    const pidEl = $('scanStatusPid'), elapsedEl = $('scanStatusElapsed');

    if(s.running) {
      scanRunning = true;
      if(btnStart) btnStart.disabled = true;
      if(btnStop) btnStop.disabled = false;
      if(statusText) { statusText.textContent = 'Running'; statusText.style.color = 'var(--green)'; }
      if(targetEl) targetEl.textContent = s.target || '—';
      if(pidEl) pidEl.textContent = s.pid || '—';
      if(elapsedEl) elapsedEl.textContent = `${s.elapsed||0}s`;
      setTimeout(pollDeepScanStatus, 2000);
    } else {
      if(scanRunning && btnStart) { btnStart.disabled = false; btnStop.disabled = true; }
      scanRunning = false;
      if(btnStart) btnStart.disabled = false;
      if(btnStop) btnStop.disabled = true;
      if(statusText) { statusText.textContent = 'Idle'; statusText.style.color = ''; }
    }
  } catch(e) { setTimeout(pollDeepScanStatus, 3000); }
}

async function startScan() {
  const target = $('scanTarget').value.trim().toLowerCase();
  const speed = $('scanSpeed').value;
  if(!target) return toast('Enter a target domain','warning');

  const log = $('scanLog');
  log.innerHTML = `<div class="line info">Starting deep scan: ${esc(target)} (${speed})...</div>`;
  $('logLineCount').textContent = '1 line';

  try {
    const res = await api('/api/scans/start', {method:'POST',body:JSON.stringify({target,speed})});
    if(res.error) { log.innerHTML += `<div class="line error">Error: ${esc(res.error)}</div>`; return toast(res.error,'error'); }
    scanRunning = true;
    toast('Scan started','success');

    const proto = location.protocol==='https:'?'wss:':'ws:';
    scanWs = new WebSocket(proto+'//'+location.host+'/api/scans/ws/log');
    scanWs.onmessage = e => {
      if(!log) return;
      const cls = e.data.startsWith('[')?(e.data.includes('[✓]')||e.data.includes('[+]')?'info':e.data.includes('[!]')||e.data.includes('[✗]')?'error':e.data.includes('[ℹ]')||e.data.includes('[▶]')?'warn':''):'';
      log.innerHTML += `<div class="line ${cls}">${esc(e.data)}</div>`;
      $('logLineCount').textContent = `${++scanLogLines} lines`;
      log.scrollTop = log.scrollHeight;
    };
    scanWs.onclose = () => { scanWs=null; pollDeepScanStatus(); };
    pollDeepScanStatus();
  } catch(e) {
    log.innerHTML += `<div class="line error">Error: ${esc(e.message)}</div>`;
    toast('Failed to start scan','error');
  }
}

async function stopScan() {
  try {
    await api('/api/scans/stop', {method:'POST'});
    if(scanWs) { scanWs.close(); scanWs=null; }
    const log=$('scanLog');
    if(log) log.innerHTML += `<div class="line warn">⛔ Scan stopped by user</div>`;
    toast('Scan stopped','warning');
    pollDeepScanStatus();
  } catch(e) { toast('Error stopping scan','error'); }
}

async function runInlineScanner() {
  const scanner = $('scannerSelect').value;
  const domain = $('scannerTarget').value.trim().toLowerCase();
  if(!domain) return toast('Enter a target domain','warning');
  const out = $('scannerOutput');
  out.innerHTML = `<div class="line info">▶ Running ${esc(scanner)} on ${esc(domain)}...</div>`;
  try {
    const res = await api('/api/scans/scanner-run', {method:'POST',body:JSON.stringify({scanner,domain})});
    const msg = res.error ? `Error: ${esc(res.error)}` : `✓ Done — ${res.findings||res.links_found||res.links_checked||res.endpoints||res.params||res.probes||0} findings`;
    out.innerHTML += `<div class="line ${res.error?'error':'info'}">${msg}</div>`;
    toast('Scanner finished','success');
  } catch(e) { out.innerHTML += `<div class="line error">Error: ${esc(e.message)}</div>`; toast(e.message,'error'); }
}

async function startPipeline() {
  const domain = $('pipelineTarget').value.trim().toLowerCase();
  if(!domain) return toast('Enter a target domain','warning');

  const steps = [
    {key:'passive',label:'Passive Recon',desc:'subfinder → assetfinder → combine'},
    {key:'active',label:'Active Recon',desc:'httpx probe → port scan → WAF detect → tech fingerprint'},
    {key:'discovery',label:'Content Discovery',desc:'gau → katana → JS analysis → fuzzing → API recon'},
    {key:'nuclei',label:'Automated Scanning',desc:'Nuclei — CVEs, exposures, misconfigs'},
    {key:'vulnscan',label:'Vulnerability Scan',desc:'SQLi → XSS → LFI → CORS → SSTI → SSRF → Host Header'},
    {key:'intel',label:'Intel & Discovery',desc:'BLH → 3rd Party → Cred → GraphQL → JS Secrets'},
  ];

  const container = $('pipelineStepsContainer');
  container.innerHTML = steps.map(s => `
    <div class="pipeline-step pending" id="pstep-${s.key}">
      <div class="step-icon">⬜</div>
      <div><div class="step-label">${esc(s.label)}</div><div class="step-desc">${esc(s.desc)}</div></div>
    </div>
  `).join('');

  const log = $('pipelineLog');
  log.innerHTML = `<div class="line info">▶ Starting pipeline for ${esc(domain)}...</div>`;

  try {
    const res = await api('/api/scans/pipeline-run', {method:'POST',body:JSON.stringify({domain})});
    steps.forEach(s => {
      const el = $('pstep-'+s.key);
      if(el) { el.className = 'pipeline-step done'; el.querySelector('.step-icon').textContent = '✓'; }
      log.innerHTML += `<div class="line info">✓ ${esc(s.label)}</div>`;
    });
    log.innerHTML += `<div class="line" style="color:var(--green);font-weight:600">✅ Pipeline complete for ${esc(domain)}</div>`;
    toast('Pipeline complete','success');
  } catch(e) {
    log.innerHTML += `<div class="line error">Error: ${esc(e.message)}</div>`;
    toast('Pipeline failed','error');
  }
}

function resultsBreadcrumb(parts) {
  // parts = [{label,click}] 
  let html = parts.map((p,i) => {
    if (i === parts.length-1) return `<span style="color:var(--text);font-weight:500">${esc(p.label)}</span>`;
    return `<a href="#" onclick="(${p.click})();return false" style="color:var(--blue)">${esc(p.label)}</a> <span style="color:var(--text-3);margin:0 6px">›</span>`;
  }).join('');
  $('resultsBreadcrumb').innerHTML = html;
}

async function loadResultsView() {
  const c = $('resultsContent');
  try {
    if (resultsState.tab === 'scans') await loadScansList(c);
    else if (resultsState.tab === 'scandetail') await loadScanDetail(c);
    else if (resultsState.tab === 'findings') await loadFindingsList(c);
    else if (resultsState.tab === 'nuclei') await loadNucleiList(c);
    else if (resultsState.tab === 'reports') await loadReportsList(c);
  } catch(e) { c.innerHTML = emptyState('❌','Error: '+esc(e.message)); }
}

    const res = await api(`/api/results/finding/${findingId}`);
    const f = res.finding;
    if (!f) return toast('Finding not found','warning');

    const sev = f.severity||'info';

// ── Nuclei ─────────────────────────────────────────────────────
async function loadNucleiList(c) {
  resultsBreadcrumb([{label:'Results'},{label:'Nuclei Output'}]);
  const res = await api('/api/results/nuclei');
  const files = res.files||[];
  if(!files.length) { c.innerHTML = emptyState('📄','No nuclei output files found.'); return; }
  let html = '';
  files.slice(0,15).forEach(f => {
    html += `<div class="card"><div class="card-header">📄 ${esc(f.file)} <span class="badge badge-neutral">${f.findings_count} findings</span></div>
    <div class="card-body">`;
    if(f.findings?.length) {
      html += `<div class="terminal" style="max-height:250px">`;
      f.findings.slice(0,40).forEach(ln => {
        const sev = ln.severity||'info';
        html += `<div class="line ${sev==='critical'||sev==='high'?'error':sev==='medium'?'warn':'info'}">${esc(ln.line)}</div>`;
      });
      if(f.findings.length > 40) html += `<div class="line muted">... +${f.findings.length-40} more</div>`;
      html += `</div>`;
    } else { html += `<div class="text-muted">No findings</div>`; }
    html += `</div></div>`;
  });
  c.innerHTML = html;
}

async function viewAcxVulns(scanId) {
  if(!scanId) return toast('No scan ID','warning');
  try {
    const res = await api(`/api/acunetix/vulns/${scanId}`);
    const vulns = res.vulnerabilities||[];
    let html = `<p style="margin-bottom:12px;color:var(--text-2)">Scan: <code>${scanId.slice(0,18)}</code> — ${vulns.length} vulns</p>`;
    if(vulns.length) {
      html += `<div class="table-wrap"><table><thead><tr><th>Severity</th><th>Name</th><th>URL</th><th>Param</th></tr></thead><tbody>`;
      vulns.forEach(v => {
        html += `<tr><td>${severityBadge(v.severity)}</td>
        <td>${esc(v.vt_name||v.name||'-')}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v.affects_url||v.url||'-')}</td>

      });
      html += `</tbody></table></div>`;

    modal('Acunetix Vulnerabilities', html, `<button class="btn btn-secondary" onclick="closeModal()">Close</button>`);
  } catch(e) { toast(e.message,'error'); }
}

// ── AI Hunt ──────────────────────────────────────────────────
async function startAiHunt() {
  const domain = $('huntDomain').value.trim().toLowerCase();
  const provider = $('huntProvider').value;
  const model = $('huntModel').value;
  if(!domain) return toast('Enter a target domain','warning');

  const btn = $('btnHunt');
  btn.disabled = true;
  btn.textContent = '⏳ Hunting...';

  const resultsDiv = $('aiHuntResults');
  resultsDiv.innerHTML = `<div class="card"><div class="card-body text-center"><div class="loading"><div class="spinner"></div><div style="margin-top:12px">🤖 AI is hunting vulnerabilities on <strong>${esc(domain)}</strong>...</div></div></div></div>`;
  const out = $('aiOutput');
  out.innerHTML = `<div class="line info">🎯 AI Hunting ${esc(domain)} via ${esc(provider)}/${esc(model)}...</div>`;

  try {
    const res = await api('/api/ai/hunt', {method:'POST',body:JSON.stringify({domain,provider,model})});
    out.innerHTML += `<div class="line" style="color:var(--green);font-weight:600">✅ Hunt complete</div><div style="white-space:pre-wrap;padding-top:8px">${esc(res.result||'')}</div>`;

    // Render structured findings if available
    if (res.parsed && res.parsed.findings) {
      const findings = res.parsed.findings;
      const counts = {};
      findings.forEach(f => { const s = (f.severity||'info').toLowerCase(); counts[s] = (counts[s]||0) + 1; });

      let html = `<div class="card"><div class="card-header">🎯 AI Hunting Results — ${esc(domain)}</div><div class="card-body">`;
      html += `<div class="stat-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:16px">
        <div class="stat-card" style="border-top:3px solid var(--red)"><div class="stat-value" style="color:var(--red)">${counts.critical||0}</div><div class="stat-label">Critical</div></div>
        <div class="stat-card" style="border-top:3px solid var(--orange)"><div class="stat-value" style="color:var(--orange)">${counts.high||0}</div><div class="stat-label">High</div></div>
        <div class="stat-card" style="border-top:3px solid var(--yellow)"><div class="stat-value" style="color:var(--yellow)">${counts.medium||0}</div><div class="stat-label">Medium</div></div>
        <div class="stat-card" style="border-top:3px solid var(--blue)"><div class="stat-value" style="color:var(--blue)">${counts.low||0}</div><div class="stat-label">Low</div></div>
        <div class="stat-card"><div class="stat-value">${findings.length}</div><div class="stat-label">Total</div></div>
      </div>`;

      findings.forEach((f, i) => {
        const sev = (f.severity||'info').toLowerCase();
        const bClass = sev==='critical'?'badge-critical':sev==='high'?'badge-high':sev==='medium'?'badge-medium':'badge-info';
        html += `<div class="card" style="background:var(--bg-3);margin-bottom:8px">
          <div class="card-header" style="padding:10px 14px">
            <span class="badge ${bClass}">${sev.toUpperCase()}</span>
            <span style="margin-left:8px;font-weight:500">${esc(f.title||'Untitled')}</span>
            <span class="badge badge-neutral" style="margin-left:auto">${esc(f.category||'other')}</span>
          </div>
          <div class="card-body" style="padding:10px 14px;font-size:13px">
            ${f.cve ? `<div style="margin-bottom:6px"><span class="tag tag-red">CVE</span> <code>${esc(f.cve)}</code> <span class="badge ${f.likelihood==='high'?'badge-high':f.likelihood==='medium'?'badge-medium':'badge-info'}">${esc(f.likelihood||'medium')} likelihood</span></div>` : ''}
            ${f.description ? `<div style="margin-bottom:6px"><span class="text-muted">Description:</span><br>${esc(f.description)}</div>` : ''}
            ${f.remediation ? `<div style="margin-bottom:6px"><span class="text-muted" style="color:var(--green)">Remediation:</span><br>${esc(f.remediation)}</div>` : ''}
            ${f.endpoints?.length ? `<div style="margin-top:6px"><span class="text-muted">Endpoints:</span><br>${f.endpoints.map(e => `<code style="background:var(--bg);padding:1px 6px;font-size:11px">${esc(e)}</code>`).join(' ')}</div>` : ''}
          </div>
        </div>`;
      });
      html += `</div></div>`;
      resultsDiv.innerHTML = html;
      toast(`Hunt complete — ${findings.length} findings`,'success');
    } else {
      resultsDiv.innerHTML = `<div class="card"><div class="card-header">🎯 Results — ${esc(domain)}</div><div class="card-body"><div class="terminal" style="max-height:300px">${esc(res.result||'')}</div></div></div>`;
      toast('Hunt complete — no structured findings parsed','info');
    }
  } catch(e) {
    out.innerHTML += `<div class="line error">Error: ${esc(e.message)}</div>`;
    resultsDiv.innerHTML = `<div class="card"><div class="card-body" style="color:var(--red)">❌ ${esc(e.message)}</div></div>`;
    toast('Hunt failed: '+e.message,'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '🎯 Start Hunt';
  }
}

    ]);
    c.innerHTML = `
    <div class="card">
      <div class="card-header">⚙️ Configuration</div>
      <div class="card-body" style="padding:0">
        <div class="table-wrap"><table><thead><tr><th>Key</th><th>Value</th></tr></thead><tbody>
        ${Object.entries(cfg.config||{}).map(([k,v]) => `<tr><td><code>${esc(k)}</code></td><td>${v ? esc(v) : '<span class="text-muted">—</span>'}</td></tr>`).join('')}
        </tbody></table></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">📁 Output Directories</div>
      <div class="card-body" style="padding:0">
        <div class="table-wrap"><table><thead><tr><th>Folder</th><th>Files</th></tr></thead><tbody>
        ${Object.entries(dirs.dirs||{}).map(([k,v]) => `<tr><td><code>${esc(k)}</code></td><td>${v.count||0}</td></tr>`).join('')}
        </tbody></table></div>
      </div>
    </div>`;
  } catch(e) { c.innerHTML = emptyState('❌','Error: '+esc(e.message)); }
};

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
PAGES.dashboard();
</script>
